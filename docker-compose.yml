version: "3.9"

services:

  backend:
    build:
      context: ./backend
    container_name: posture_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
    environment:
      - ENV=production
    restart: always
    env_file:
      - ./backend/.env
  frontend:
    build:
      context: ./frontend
    container_name: posture_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
    env_file:
      - ./frontend/.env