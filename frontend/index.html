<!doctype html>
<html lang="en">
  <head>
    <!-- Core Meta -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>PostureAI | AI-Powered Posture Analysis Platform</title>
    <meta
      name="description"
      content="Upload a 10–15 second video and receive an instant AI-powered posture assessment. Includes annotated video playback, posture metrics, and downloadable PDF report."
    />
    <meta
      name="keywords"
      content="AI posture analysis, posture assessment, spine alignment analysis, health-tech AI, posture detection system"
    />
    <meta name="author" content="PostureAI" />
    <meta name="theme-color" content="#2563EB" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="PostureAI | AI-Powered Posture Analysis" />
    <meta
      property="og:description"
      content="Medical-grade AI posture analysis with annotated video results and detailed metrics."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PostureAI – AI Posture Assessment" />
    <meta
      name="twitter:description"
      content="Upload a short video and receive instant AI-powered posture analysis."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Performance Optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts (Professional Medical Feel) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- PWA Ready -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Prevent Flash of Unstyled Content -->
    <style>
      html {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background-color: #ffffff;
        color: #111827;
      }

      body {
        margin: 0;
        padding: 0;
      }

      #root {
        min-height: 100vh;
      }
    </style>
  </head>

  <body>
    <noscript>
      <strong>
        This application requires JavaScript to run properly. Please enable JavaScript.
      </strong>
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
